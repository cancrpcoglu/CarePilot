services:
  db:
    image: pgvector/pgvector:pg16
    container_name: carepilot_db
    environment:
      POSTGRES_USER: carepilot
      POSTGRES_PASSWORD: carepilot
      POSTGRES_DB: carepilot
    ports:
      - "5432:5432"
    volumes:
      - carepilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carepilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: carepilot_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://carepilot:carepilot@db:5432/carepilot
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  carepilot_pgdata:
